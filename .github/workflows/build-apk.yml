name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - run: npm install
      - run: npm install -g @capacitor/cli
      - run: npm run build
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3
      
      - name: Setup Android project
        run: npx cap add android
      
      - name: Create Java files
        run: |
          mkdir -p android/app/src/main/java/com/boxplayer/plugins
          mkdir -p android/app/src/main/java/com/boxplayer
          
          # Create AllFilesAccessPlugin.java
          cat > android/app/src/main/java/com/boxplayer/plugins/AllFilesAccessPlugin.java << 'EOF'
          package com.boxplayer.plugins;
          
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Environment;
          import android.provider.Settings;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;
          
          @CapacitorPlugin(name = "AllFilesAccess")
          public class AllFilesAccessPlugin extends Plugin {
          
              @PluginMethod
              public void requestPermission(PluginCall call) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      if (!Environment.isExternalStorageManager()) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION);
                          intent.setData(Uri.parse("package:" + getContext().getPackageName()));
                          startActivity(intent);
                      }
                      JSObject result = new JSObject();
                      result.put("requested", true);
                      call.resolve(result);
                  } else {
                      call.reject("Permission not required on this Android version");
                  }
              }
          
              @PluginMethod
              public void checkPermission(PluginCall call) {
                  boolean hasPermission = false;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      hasPermission = Environment.isExternalStorageManager();
                  }
                  JSObject result = new JSObject();
                  result.put("granted", hasPermission);
                  call.resolve(result);
              }
          }
          EOF
          
          # Create MainActivity.java
          cat > android/app/src/main/java/com/boxplayer/MainActivity.java << 'EOF'
          package com.boxplayer;
          
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          
          public class MainActivity extends BridgeActivity {
          
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF
          
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: BoxPlayer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
