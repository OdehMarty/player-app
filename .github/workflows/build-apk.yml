name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - run: npm installgk
      - run: npm install -g @capacitor/cli
      
      # Skip TypeScript checking, just build with Vite
      - run: npx vite build
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: android-actions/setup-android@v3
      
      - name: Setup Android project
        run: npx cap add android
      
      - name: Add custom plugin
        run: |
          mkdir -p android/app/src/main/java/com/boxplayer/plugins/
          echo "" | base64 -d > android/app/src/main/java/com/boxplayer/plugins/AllFilesAccessPlugin.java
          
      - name: Add MainActivity
        run: |
          echo "" | base64 -d > android/app/src/main/java/com/boxplayer/MainActivity.java
          
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      
      - uses: actions/upload-artifact@v4
        with:
          name: BoxPlayer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk