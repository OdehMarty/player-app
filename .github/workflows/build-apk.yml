name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create fresh Capacitor project
        run: |
          mkdir BoxPlayer
          cd BoxPlayer
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init BoxPlayer com.boxplayer --web-dir=www
          npx cap add android
          
          # Create a simple web app
          mkdir www
          cat > www/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BoxPlayer</title>
            <style>
              body {
                background: #111;
                color: white;
                font-family: sans-serif;
                text-align: center;
                padding: 50px;
                margin: 0;
              }
              button {
                background: #1D9E75;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 16px;
                margin-top: 20px;
              }
            </style>
          </head>
          <body>
            <h1>📱 BoxPlayer</h1>
            <p>Video player is ready!</p>
            <button onclick="requestPermission()">Grant Storage Permission</button>
            <script>
              async function requestPermission() {
                alert('Please grant storage permission in Android settings');
              }
            </script>
          </body>
          </html>
          HTML
          
          # Replace the entire AndroidManifest.xml with correct version
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.boxplayer">
          
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
          
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme"
                  android:requestLegacyExternalStorage="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:exported="true"
                      android:launchMode="singleTask">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoxPlayer
          path: BoxPlayer/android/app/build/outputs/apk/debug/app-debug.apk