name: Build Android APK

on:
  push:
    branches: [ "main", "work" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Build web assets
        run: npm run build

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android platform
        run: |
          # Remove existing android folder if it exists (but keep custom plugin code)
          rm -rf android
          # Add fresh Android platform
          npx cap add android
          # Copy custom plugin back
          mkdir -p android/app/src/main/java/com/boxplayer/plugins/
          cp -r android-src-plugins/* android/app/src/main/java/com/boxplayer/plugins/ 2>/dev/null || true
          # Copy custom MainActivity if needed
          cp android-src-main/MainActivity.java android/app/src/main/java/com/boxplayer/ 2>/dev/null || true

      - name: Sync Capacitor (copy web assets)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: boxplayer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7