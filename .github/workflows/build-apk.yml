name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Create fresh Capacitor project
        run: |
          mkdir BoxPlayer
          cd BoxPlayer
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init BoxPlayer com.boxplayer --web-dir=www
          npx cap add android
          
          # Create a simple web app
          mkdir www
          cat > www/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BoxPlayer</title>
            <style>
              body {
                background: #111;
                color: white;
                font-family: sans-serif;
                text-align: center;
                padding: 50px;
                margin: 0;
              }
              button {
                background: #1D9E75;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 16px;
                margin-top: 20px;
              }
            </style>
          </head>
          <body>
            <h1>📱 BoxPlayer</h1>
            <p>Video player is ready!</p>
            <button onclick="requestPermission()">Grant Storage Permission</button>
            <script>
              async function requestPermission() {
                alert('Please grant storage permission in Android settings');
              }
            </script>
          </body>
          </html>
          HTML
          
          # Replace AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
          
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:theme="@style/AppTheme"
                  android:requestLegacyExternalStorage="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:exported="true"
                      android:launchMode="singleTask">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Fix build.gradle with correct versions
          cat > android/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.9.1'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 36
              namespace "com.boxplayer"
              
              defaultConfig {
                  applicationId "com.boxplayer"
                  minSdk 23
                  targetSdk 36
                  versionCode 1
                  versionName "1.0"
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_21
                  targetCompatibility JavaVersion.VERSION_21
              }
          }
          
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
          }
          EOF
          
          # Add gradle.properties
          cat > android/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=36
          EOF
          
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoxPlayer
          path: BoxPlayer/android/app/build/outputs/apk/debug/app-debug.apk