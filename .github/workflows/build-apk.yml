name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create fresh Capacitor project
        run: |
          mkdir BoxPlayer
          cd BoxPlayer
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init BoxPlayer com.boxplayer --web-dir=www
          npx cap add android
          
          # Create a simple web app
          mkdir www
          cat > www/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BoxPlayer</title>
            <style>
              body {
                background: #111;
                color: white;
                font-family: sans-serif;
                text-align: center;
                padding: 50px;
                margin: 0;
              }
              button {
                background: #1D9E75;
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 16px;
                margin-top: 20px;
              }
            </style>
          </head>
          <body>
            <h1>📱 BoxPlayer</h1>
            <p>Video player is ready!</p>
            <button onclick="requestPermission()">Grant Storage Permission</button>
            <script>
              async function requestPermission() {
                alert('Please grant storage permission in Android settings');
              }
            </script>
          </body>
          </html>
          HTML
          
          # Add permissions
          cat >> android/app/src/main/AndroidManifest.xml << 'PERM'
          <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
          <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
          <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
          PERM
          
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoxPlayer
          path: BoxPlayer/android/app/build/outputs/apk/debug/app-debug.apk